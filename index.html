<!DOCTYPE html>
<html lang="en" class="dark">
    <head>
        <title>SiMukst</title>
        <meta charset="utf-8">
        <meta name="description" content="SiMukst">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link href="./dist/css/styles.css" rel="stylesheet">
        <script src="https://kit.fontawesome.com/73efcb68fc.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="min-h-screen bg-neutral-900 py-24 flex flex-col justify-around" id="#home">
            <!-- Fixed Header -->
            <div class="container flex justify-between mx-auto items-end">
                <a href="#home" class="">
                    <img src="./dist/img/horizontal_dk_big_press.png" alt="SiMukst" class="h-12 opacity-80">
                </a>
                <button id="darkMode">
                    <svg class="text-neutral-400 w-8 h-8 font-light" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                    </svg>   
                </button>
            </div>

            <!-- Mid section-->
            <div class="container flex justify-between mx-auto items-center">
                <!-- Content -->
                <div>
                    <h1 class="text-base font-thin tracking-widest uppercase"><span class="text-primary-400">Mukti</span> <span class="text-neutral-100">Setyaji</span></h1>
                    <h1 class="text-5xl text-neutral-100 pt-12">Data Analyst</h1>
                </div>
                
                <!-- Navbar -->
                <aside class="w-32">
                    <nav class="flex flex-col">
                        <span class="relative flex items-center text-primary-400 py-12">
                            <a href="#home" class="flex-shrink mr-4">Home</a>
                            <div class="flex-grow border-t-2 border-primary-400"></div>
                        </span>
                        <span class="relative flex items-center text-neutral-500 py-12">
                            <a href="#Services" class="flex-shrink mr-4">Services</a>
                            <div class="flex-grow border-t border-neutral-500"></div>
                        </span>
                        <span class="relative flex items-center text-neutral-500 py-12">
                            <a href="#Portfolio" class="flex-shrink mr-4">Portfolio</a>
                            <div class="flex-grow border-t border-neutral-500"></div>
                        </span>
                        <span class="relative flex items-center text-neutral-500 py-12">
                            <a href="#About" class="flex-shrink mr-4">About</a>
                            <div class="flex-grow border-t border-neutral-500"></div>
                        </span>
                    </nav>
                </aside>
            </div>

            <!-- Footer -->
            <div class="container flex justify-between mx-auto items-end">
                <div class="flex text-neutral-500">
                    <a href="" class="pr-8 text-neutral-800 fa-brands">
                        <span class="fa-linkedin-in fa-xl"></span>
                    </a>
                    <a href="" class="px-8 text-neutral-800">
                        <span class="fa fa-instagram fa-xl"></span>
                    </a>
                    <a href="" class="px-8 text-neutral-800">
                        <span class="fa-regular fa-earth-asia fa-xl"></span>
                    </a>
                    <a href="" class="px-8 text-neutral-800">
                        <span class="fa-brands fa-github fa-xl"></span>
                    </a>
                </div>
                <span class="text-xs font-thin text-accent-blue-200">My Store</span>
            </div>
        </div>
    </body>
</html>
